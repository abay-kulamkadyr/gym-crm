# Local DB
spring.datasource.url=jdbc:postgresql://localhost:5432/gym-crm
spring.datasource.username=myuser
spring.datasource.password=password

# Recreate schema for clean local runs
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.format_sql=true

# Verbose logging
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.com.epam=DEBUG
logging.file.name=

# Pretty JSON
spring.jackson.serialization.indent-output=true

# Full actuator for local debugging
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=*

# Bootstrap data paths
storage.init.users=/users.json
storage.init.trainees=/trainees.json
storage.init.trainers=/trainers.json
storage.init.trainings=/trainings.json
storage.init.trainingTypes=/trainingTypes.json

# Local infrastructure
spring.kafka.bootstrap-servers=localhost:9092
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# JWT - local only
security.jwt.secret=6cphIzZx0mXxVauGgSNM2WvPmy_2EDu7Bl70ZHJppH4
security.jwt.lifetime=30m
