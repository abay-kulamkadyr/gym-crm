spring.datasource.url=${POSTGRESQL_URL}
spring.datasource.username=${POSTGRESQL_USERNAME}
spring.datasource.password=${POSTGRESQL_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.com.epam=INFO
logging.file.name=./logs/gym-app.log

spring.jackson.serialization.indent-output=false

springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Minimal actuator surface in prod
management.endpoint.health.show-details=never
management.endpoints.web.exposure.include=health,info

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
eureka.client.serviceUrl.defaultZone=${EUREKA_URL}

security.jwt.secret=${JWT_SECRET}
security.jwt.lifetime=30m
security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
