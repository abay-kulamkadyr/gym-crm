# H2 with PostgreSQL compatibility mode
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Recreate schema on every test run
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# Disable Service Discovery
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# Use embedded broker for Kafka
spring.kafka.bootstrap-servers=${spring.embedded.kafka.brokers}
app.kafka.topics.training-created=test-topic

# Disable Circuit breaker
spring.cloud.openfeign.circuitbreaker.enabled=false

# Security
security.jwt.secret=6cphIzZx0mXxVauGgSNM2WvPmy_2EDu7Bl70ZHJppH4
security.jwt.lifetime=30m
security.login.max-attempts=3
security.login.penalty=5m
security.cors.allowed-origins=http://localhost:3000

# Disable Actuator
management.endpoints.web.exposure.include=
management.endpoint.health.enabled=false
management.endpoint.metrics.enabled=false
management.endpoint.prometheus.enabled=false

# Disable API Docs
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Quiet Logging
logging.level.root=ERROR
logging.level.org.springframework=ERROR
logging.level.com.epam=ERROR
# Silence request/response noise in test output
logging.level.com.epam.infrastructure.logging=OFF
logging.level.com.epam.interfaces.web.advice.GlobalExceptionHandler=OFF
logging.level.com.epam.infrastructure.bootstrap.DatabaseBootstrapper=OFF
logging.level.com.epam.infrastructure.bootstrap.JsonDataLoader=OFF
# No file logging in tests
logging.file.name=
